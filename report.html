<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Klaras Fortschritt — Eltern-Bericht</title>
<style>
:root { --primary: #1C5B7A; --dark: #154458; --success: #2F8F5B; --warn: #c47a00; --danger: #c0392b; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f2ec; color: #333; line-height: 1.45; }
header { background: linear-gradient(135deg, var(--primary), var(--dark)); color: #fff; padding: 28px 20px; text-align: center; }
header h1 { font-size: 26px; margin-bottom: 6px; }
header p { opacity: 0.9; font-size: 14px; }
.container { max-width: 920px; margin: 0 auto; padding: 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin: 16px 0 24px; }
.card { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.card h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: #777; margin-bottom: 6px; }
.stat { font-size: 30px; font-weight: 800; color: var(--primary); }
.label { font-size: 12px; color: #888; margin-top: 4px; }
.section { margin-bottom: 28px; }
.section h2 { font-size: 18px; color: var(--primary); margin-bottom: 12px; }
.area-row, .session-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 12px 14px; background: #fff; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid var(--primary); box-shadow: 0 1px 2px rgba(0,0,0,.05); }
.area-row .name, .session-row .name { font-weight: 650; }
.muted { color: #888; font-size: 12px; }
.score-good { color: var(--success); font-weight: 700; }
.score-mid { color: var(--warn); font-weight: 700; }
.score-low { color: var(--danger); font-weight: 700; }
.empty { text-align: center; padding: 48px 20px; color: #666; }
.btn { display: inline-block; padding: 10px 16px; background: var(--primary); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; text-decoration: none; margin: 4px; }
.btn-secondary { background: #fff; color: var(--primary); border: 2px solid var(--primary); }
.actions { text-align: center; margin: 20px 0; }
.import-box { margin-top: 16px; }
.import-box textarea { width: 100%; min-height: 90px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-family: ui-monospace, monospace; font-size: 12px; }
.hint { background: #e8f1f6; border-radius: 8px; padding: 14px; font-size: 13px; color: #234; margin-bottom: 20px; }
.week { white-space: pre-wrap; background: #fff; border-radius: 8px; padding: 14px; font-size: 14px; border: 1px solid #e2e2e2; }
</style>
</head>
<body>
<header>
  <h1>Klaras Fortschritt</h1>
  <p>Eltern-Bericht · Multicheck Trainer</p>
</header>
<div class="container" id="app">
  <div class="empty">Bericht wird geladen…</div>
</div>

<script>
const AREA_NAMES = {
  deutsch: 'Deutsch', englisch: 'Englisch', franzoesisch: 'Französisch',
  mathematik: 'Mathematik', logic: 'Logik', organisation: 'Organisation',
  networked: 'Vernetztes Denken', numbersequence: 'Zahlenreihen',
  figural: 'Figuren', exam: 'Prüfungssimulation', review: 'Fehler-Übung'
};

function areaName(id) { return AREA_NAMES[id] || id || '?'; }
function scoreClass(pct) {
  if (pct >= 75) return 'score-good';
  if (pct >= 60) return 'score-mid';
  return 'score-low';
}
function fmtDuration(secs) {
  secs = Math.max(0, Math.round(secs || 0));
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return m + ':' + String(s).padStart(2, '0');
}
function fmtDate(iso) {
  try {
    return new Date(iso).toLocaleString('de-CH', {
      weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
    });
  } catch (e) { return iso; }
}
function dayKey(iso) {
  const d = new Date(iso);
  return d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
}

function decodePayload(raw) {
  if (!raw) return null;
  try {
    const json = decodeURIComponent(escape(atob(raw.replace(/-/g, '+').replace(/_/g, '/'))));
    const data = JSON.parse(json);
    if (Array.isArray(data)) return { sessions: data, exportedAt: null };
    if (data && Array.isArray(data.sessions)) return data;
  } catch (e) {}
  return null;
}

function encodePayload(sessions) {
  const payload = JSON.stringify({
    v: 1,
    exportedAt: new Date().toISOString(),
    sessions: sessions || []
  });
  return btoa(unescape(encodeURIComponent(payload))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

function loadSessions() {
  const params = new URLSearchParams(location.search);
  const hash = location.hash.replace(/^#/, '');
  const fromUrl = decodePayload(params.get('d') || params.get('data') || hash);
  if (fromUrl) return fromUrl;

  try {
    const local = JSON.parse(localStorage.getItem('mc_sessions') || '[]');
    if (Array.isArray(local) && local.length) {
      return { sessions: local, exportedAt: null, source: 'localStorage' };
    }
  } catch (e) {}
  return null;
}

function calcStreak(sessions) {
  if (!sessions.length) return 0;
  const days = [...new Set(sessions.map(s => dayKey(s.date)))].sort((a, b) => {
    const [ay, am, ad] = a.split('-').map(Number);
    const [by, bm, bd] = b.split('-').map(Number);
    return new Date(by, bm - 1, bd) - new Date(ay, am - 1, ad);
  });
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const parseDay = (k) => {
    const [y, m, d] = k.split('-').map(Number);
    return new Date(y, m - 1, d);
  };
  let streak = 0;
  let cursor = today;
  const daySet = new Set(days);
  // allow yesterday start if no training today
  const todayKey = dayKey(today.toISOString());
  const yest = new Date(today); yest.setDate(yest.getDate() - 1);
  if (!daySet.has(todayKey) && daySet.has(dayKey(yest.toISOString()))) cursor = yest;

  while (true) {
    const key = dayKey(cursor.toISOString());
    if (!daySet.has(key)) break;
    streak++;
    cursor.setDate(cursor.getDate() - 1);
  }
  return streak;
}

function byArea(sessions) {
  const map = {};
  sessions.forEach(s => {
    const id = s.area || 'exam';
    if (!map[id]) map[id] = { area: id, count: 0, correct: 0, total: 0, pctSum: 0 };
    map[id].count++;
    map[id].correct += s.correct || 0;
    map[id].total += s.total || 0;
    map[id].pctSum += s.percentage || 0;
  });
  return Object.values(map).map(a => ({
    ...a,
    avg: a.count ? Math.round(a.pctSum / a.count) : 0
  })).sort((a, b) => b.avg - a.avg);
}

function weeklySummary(sessions) {
  const weekAgo = Date.now() - 7 * 24 * 3600 * 1000;
  const recent = sessions.filter(s => new Date(s.date).getTime() >= weekAgo);
  const avg = recent.length ? Math.round(recent.reduce((a, s) => a + (s.percentage || 0), 0) / recent.length) : 0;
  const days = new Set(recent.map(s => dayKey(s.date))).size;
  const areas = byArea(recent).slice(0, 5).map(a => areaName(a.area) + ' ' + a.avg + '%').join(', ');
  const lines = [
    '📋 Klaras Multicheck — Wochenbericht',
    'Zeitraum: letzte 7 Tage',
    '',
    'Trainings: ' + recent.length,
    'Übungstage: ' + days,
    'Ø Erfolg: ' + avg + '%',
    'Serie: ' + calcStreak(sessions) + ' Tag(e)',
    areas ? ('Bereiche: ' + areas) : 'Noch keine Trainings diese Woche.',
    '',
    'Vollständiger Bericht: https://ali32782.github.io/Klaras-Multicheck/report.html'
  ];
  return lines.join('\n');
}

function renderReport(data) {
  const sessions = (data.sessions || []).slice().sort((a, b) => new Date(b.date) - new Date(a.date));
  const app = document.getElementById('app');

  if (!sessions.length) {
    app.innerHTML = `
      <div class="empty">
        <h2>Noch keine Trainingsdaten</h2>
        <p style="margin:12px 0">Öffne den Bericht über den Trainer<br>(Statistiken → Eltern-Bericht),<br>oder füge unten einen exportierten Bericht ein.</p>
        <a class="btn" href="index.html">Zum Trainer</a>
        <div class="import-box">
          <textarea id="importText" placeholder="Exportierten JSON-Bericht hier einfügen…"></textarea>
          <button class="btn" style="width:100%;margin-top:8px" onclick="importPasted()">Bericht laden</button>
        </div>
      </div>`;
    return;
  }

  const avg = Math.round(sessions.reduce((a, s) => a + (s.percentage || 0), 0) / sessions.length);
  const totalCorrect = sessions.reduce((a, s) => a + (s.correct || 0), 0);
  const totalQ = sessions.reduce((a, s) => a + (s.total || 0), 0);
  const streak = calcStreak(sessions);
  const uniqueDays = new Set(sessions.map(s => dayKey(s.date))).size;
  const areas = byArea(sessions);
  const weekText = weeklySummary(sessions);
  const sourceNote = data.source === 'localStorage'
    ? 'Daten von diesem Gerät (localStorage).'
    : (data.exportedAt ? 'Exportiert: ' + fmtDate(data.exportedAt) : 'Geteilter Bericht.');

  app.innerHTML = `
    <div class="hint">${sourceNote} Kein Login nötig.</div>
    <div class="grid">
      <div class="card"><h3>Trainings</h3><div class="stat">${sessions.length}</div><div class="label">gesamt</div></div>
      <div class="card"><h3>Ø Erfolg</h3><div class="stat">${avg}%</div><div class="label">${totalCorrect}/${totalQ} richtig</div></div>
      <div class="card"><h3>Übungstage</h3><div class="stat">${uniqueDays}</div><div class="label">mit Training</div></div>
      <div class="card"><h3>Serie</h3><div class="stat">${streak}</div><div class="label">Tage in Folge</div></div>
    </div>

    <div class="section">
      <h2>Erfolg pro Bereich</h2>
      ${areas.map(a => `
        <div class="area-row">
          <div>
            <div class="name">${areaName(a.area)}</div>
            <div class="muted">${a.count} Training${a.count === 1 ? '' : 's'} · ${a.correct}/${a.total} richtig</div>
          </div>
          <div class="${scoreClass(a.avg)}">${a.avg}%</div>
        </div>`).join('')}
    </div>

    <div class="section">
      <h2>Letzte Trainings</h2>
      ${sessions.slice(0, 25).map(s => {
        const diff = s.difficulty || '';
        return `
        <div class="session-row">
          <div>
            <div class="name">${areaName(s.area)}</div>
            <div class="muted">${fmtDate(s.date)}${diff ? ' · ' + diff : ''} · ${fmtDuration(s.durationSecs)}</div>
          </div>
          <div style="text-align:right">
            <div class="${scoreClass(s.percentage || 0)}">${s.percentage || 0}%</div>
            <div class="muted">${s.correct}/${s.total}</div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <div class="section">
      <h2>Wochen-Kurzbericht</h2>
      <div class="week" id="weekText">${weekText.replace(/</g, '&lt;')}</div>
      <div class="actions">
        <button class="btn" onclick="copyWeek()">Wochenbericht kopieren</button>
        <button class="btn btn-secondary" onclick="copyLink()">Bericht-Link kopieren</button>
        <a class="btn btn-secondary" href="index.html">Zum Trainer</a>
      </div>
    </div>
  `;
  window.__sessions = sessions;
}

function copyWeek() {
  const text = weeklySummary(window.__sessions || []);
  navigator.clipboard.writeText(text).then(() => alert('Wochenbericht kopiert — z.B. in WhatsApp einfügen.')).catch(() => {
    prompt('Kopieren:', text);
  });
}

function copyLink() {
  const sessions = window.__sessions || [];
  const encoded = encodePayload(sessions.slice(0, 80));
  const url = location.origin + location.pathname + '?d=' + encoded;
  if (url.length > 7000) {
    alert('Zu viele Trainings für einen Link. Bitte „Wochenbericht kopieren“ nutzen oder im Trainer exportieren.');
    return;
  }
  navigator.clipboard.writeText(url).then(() => alert('Link kopiert! Papa kann ihn ohne Login öffnen.')).catch(() => prompt('Link:', url));
}

function importPasted() {
  const raw = (document.getElementById('importText') || {}).value || '';
  try {
    const data = JSON.parse(raw);
    const sessions = Array.isArray(data) ? data : (data.sessions || []);
    if (!sessions.length) throw new Error('leer');
    renderReport({ sessions, exportedAt: data.exportedAt || null, source: 'import' });
  } catch (e) {
    alert('Konnte den Bericht nicht lesen. Bitte den JSON-Export aus dem Trainer einfügen.');
  }
}

// expose encode for trainer deep-links
window.MCReport = { encodePayload, decodePayload, weeklySummary };

const loaded = loadSessions();
if (loaded) renderReport(loaded);
else renderReport({ sessions: [] });
</script>
</body>
</html>
