<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Klaras Multicheck</title>
<style>
body { font-family: -apple-system, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
#app { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
h1 { color: #1C5B7A; }
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.btn { padding: 15px; background: #1C5B7A; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
.btn:hover { background: #154458; }
.btn-login { position: fixed; top: 20px; right: 20px; }
.q { font-size: 18px; margin: 20px 0; font-weight: bold; }
.opt { display: block; width: 100%; padding: 12px; margin: 8px 0; background: #f9f9f9; border: 2px solid #ddd; cursor: pointer; text-align: left; }
.opt:hover { border-color: #1C5B7A; }
.progress { font-size: 14px; color: #666; margin: 20px 0; }
.score { font-size: 48px; font-weight: bold; color: #1C5B7A; text-align: center; }
</style>
</head>
<body>
<button class="btn-login" id="authBtn">Login</button>
<div id="app"></div>

<script>
var state = { screen: 'home', area: null, round: 0, score: 0, correct: 0 };

var areas = [
  { id: 'math', name: 'Math' },
  { id: 'deutsch', name: 'Deutsch' },
  { id: 'english', name: 'English' },
  { id: 'logik', name: 'Logik' },
  { id: 'science', name: 'Science' }
];

var questions = {
  math: [
    { q: '2+2=?', opts: ['4', '3', '5'], ans: 0 },
    { q: '5x3=?', opts: ['15', '12', '18'], ans: 0 },
    { q: '10-3=?', opts: ['7', '6', '8'], ans: 0 }
  ],
  deutsch: [
    { q: 'Synonym for big?', opts: ['gross', 'klein', 'mittel'], ans: 0 },
    { q: 'Opposite of slow?', opts: ['schnell', 'langsam', 'neu'], ans: 0 }
  ],
  english: [
    { q: 'big in German?', opts: ['gross', 'klein', 'neu'], ans: 0 },
    { q: 'hello in German?', opts: ['hallo', 'tschuess', 'danke'], ans: 0 }
  ],
  logik: [
    { q: '2,4,6,?', opts: ['8', '7', '9'], ans: 0 },
    { q: '1,1,2,3,5,?', opts: ['8', '6', '7'], ans: 0 }
  ],
  science: [
    { q: 'Biggest planet?', opts: ['Jupiter', 'Earth', 'Mars'], ans: 0 },
    { q: 'Human bones?', opts: ['206', '150', '250'], ans: 0 }
  ]
};

function rand(max) { return Math.floor(Math.random() * max); }

function render() {
  var app = document.getElementById('app');
  
  if (state.screen === 'home') {
    var html = '<h1>Klaras Multicheck</h1><div class="grid">';
    for (var i = 0; i < areas.length; i++) {
      html += '<button class="btn" onclick="startGame(\'' + areas[i].id + '\')">' + areas[i].name + '</button>';
    }
    html += '</div>';
    app.innerHTML = html;
  }
  else if (state.screen === 'play') {
    var qs = questions[state.area];
    if (!qs || qs.length === 0) { alert('No questions'); return; }
    var q = qs[rand(qs.length)];
    var html = '<div class="progress">Question ' + (state.round + 1) + '/20</div>';
    html += '<div class="q">' + q.q + '</div>';
    for (var i = 0; i < q.opts.length; i++) {
      html += '<button class="opt" onclick="answer(' + i + ',' + q.ans + ')">' + q.opts[i] + '</button>';
    }
    app.innerHTML = html;
  }
  else if (state.screen === 'result') {
    app.innerHTML = '<h1>Done!</h1><div class="score">' + state.score + '</div><div>' + state.correct + '/20 correct</div><button class="btn" onclick="render_home()">Back</button>';
  }
}

function render_home() {
  state.screen = 'home';
  render();
}

function startGame(area) {
  state.screen = 'play';
  state.area = area;
  state.round = 0;
  state.score = 0;
  state.correct = 0;
  render();
}

function answer(idx, correct) {
  if (idx === correct) {
    state.score += 10;
    state.correct += 1;
  }
  state.round += 1;
  if (state.round >= 20) {
    state.screen = 'result';
  }
  render();
}

document.getElementById('authBtn').onclick = function() {
  alert('Google Login: Use Firebase Console to set up Google Auth');
};

render();
</script>
</body>
</html>
