// Aufgabentypen:
//  kind:"choice"  -> Multiple Choice (Text), opts:[{v,ok}]
//  kind:"visual"  -> Multiple Choice mit SVG-Optionen, opts:[{html,ok}]
//  kind:"count"   -> Zahl 0..N anklicken (answer + maxN)
//  kind:"order"   -> Reihenfolge per Drag&Drop (items + correct[])
function C(kicker,q,opts,visualHtml){return {kind:"choice",kicker,q,opts,visualHtml:visualHtml||null};}
function V(kicker,q,opts){return {kind:"visual",kicker,q,opts};}
function CNT(kicker,q,answer,maxN,visualHtml){return {kind:"count",kicker,q,answer,maxN:maxN||9,visualHtml};}
function ORD(kicker,q,items,correct){return {kind:"order",kicker,q,items,correct};}

// MATHE
function genMath(lv){
  const pool = lv===0?["arith","sequence","word","dots"]
             : lv===1?["arith","mult","percent","fraction","sequence","word","compare","dots"]
             : ["mult","percent","fraction","sequence2","word2","power","compare","equation"];
  const type=pick(pool);
  if(type==="arith"){const r=lv===0?[5,40]:[20,99];const a=rnd(r[0],r[1]),b=rnd(r[0],r[1]),op=pick(["+","−"]);const ans=op==="+"?a+b:a-b;return C("Kopfrechnen",`${a} ${op} ${b} = ?`,makeOptions(ans,[ans+rnd(1,9),ans-rnd(2,8),ans+10]));}
  if(type==="mult"){const x=lv===2?rnd(11,25):rnd(6,15),y=lv===2?rnd(6,19):rnd(6,15);return C("Multiplikation",`${x} × ${y} = ?`,makeOptions(x*y,[x*y+rnd(2,12),x*y-rnd(2,12),x*(y+1)]));}
  if(type==="percent"){const base=pick(lv===2?[180,240,320,450,640]:[40,60,80,120,150,200]),p=pick(lv===2?[12,18,35,65,85]:[10,20,25,50,75]);const ans=Math.round(base*p)/100;return C("Prozent",`${p}% von ${base} = ?`,makeOptions(ans,[ans+base/10,ans-base/20,Math.round(ans*1.5)]));}
  if(type==="fraction"){const d=pick(lv===2?[3,6,7,8,12]:[2,4,5,8,10]),n=rnd(1,d-1),whole=d*rnd(4,14);const ans=(whole/d)*n;return C("Bruchrechnen",`${n}/${d} von ${whole} = ?`,makeOptions(ans,[ans+d,ans-n,whole/d]));}
  if(type==="power"){const x=rnd(4,13);return C("Potenz",`${x}² = ?`,makeOptions(x*x,[x*x+rnd(2,9),x*x-rnd(2,9),(x+1)*(x+1)]));}
  if(type==="equation"){const x=rnd(3,12),a=rnd(2,9),b=rnd(1,20);const res=a*x+b;return C("Gleichung",`${a} · x + ${b} = ${res}.  Was ist x?`,makeOptions(x,[x+1,x-1,x+2]));}
  if(type==="compare"){const a=rnd(2,12)*rnd(2,9),b=rnd(2,12)*rnd(2,9);const big=Math.max(a,b),sm=Math.min(a,b);const ans=big===a?`${a}`:`${b}`;return C("Vergleich",`Welche Zahl ist grösser?`,makeOptions(`${big}`,[`${sm}`,`beide gleich`,`${sm-1}`]));}
  if(type==="sequence"){const s=rnd(2,9),st=pick([2,3,4,5,6,7,8]);const seq=[s,s+st,s+2*st,s+3*st];return C("Zahlenreihe",`Setze fort:  ${seq.join(", ")},  ?`,makeOptions(s+4*st,[s+4*st+st,s+4*st-1,s+4*st+1]));}
  if(type==="sequence2"){const s=rnd(1,4),f=pick([2,3]);const seq=[s,s*f,s*f*f,s*f*f*f];const ans=s*f*f*f*f;return C("Zahlenreihe",`Setze fort:  ${seq.join(", ")},  ?`,makeOptions(ans,[ans+f,ans-f,Math.round(ans*1.5)]));}
  if(type==="word2"){const speed=rnd(40,90),h=rnd(2,5);const ans=speed*h;return C("Textaufgabe",`Ein Auto fährt ${speed} km/h für ${h} Stunden. Wie weit kommt es?`,makeOptions(`${ans} km`,[`${ans+speed} km`,`${ans-speed} km`,`${speed+h} km`]));}
  if(type==="dots"){const n=lv===0?rnd(4,9):rnd(6,9);return CNT("Punkte zählen","Wie viele Punkte siehst du?",n,9,svgDots(n,180));}
  const people=rnd(3,9),price=rnd(4,14);const ans=people*price;return C("Textaufgabe",`${people} Personen kaufen je ein Ticket für ${price} Fr. Wie viel kostet es zusammen?`,makeOptions(`${ans} Fr.`,[`${ans+price} Fr.`,`${ans-price} Fr.`,`${people+price} Fr.`]));
}
// DEUTSCH
function genGerman(lv){
  const type=pick(lv===0?["syn","opp","spell","order"]:["syn","opp","spell","order","scramble"]);
  if(type==="syn"){const [w,o]=pick(SYN[lv]);return C("Synonym",`Welches Wort bedeutet dasselbe wie „${w}“?`,makeOptions(o[0],o.slice(1)));}
  if(type==="opp"){const [w,o]=pick(OPP[lv]);return C("Gegenteil",`Welches Wort ist das Gegenteil von „${w}“?`,makeOptions(o[0],o.slice(1)));}
  if(type==="spell"){const [c,w]=pick(SPELL[lv]);return C("Rechtschreibung",`Welche Schreibweise ist richtig?`,makeOptions(c,w));}
  if(type==="scramble"){const [c]=pick(SPELL[lv]);const sc=shuffle(c.split("")).join("");const wrong=[c.slice(1)+c[0],c.split("").reverse().join(""),c.slice(0,-1)+"e"];return C("Buchstabensalat",`Welches Wort ergibt sich aus: ${sc.toUpperCase()} ?`,makeOptions(c,wrong));}
  const [label,seq]=pick(ORDER[lv]); const correct=[...seq]; return ORD("Reihenfolge",`Ordne nach: ${label}`,shuffle(seq),correct);
}
// ENGLISCH
function genEnglish(lv){
  const type=pick(lv===0?["vocab","opp","match"]:["vocab","opp","match","gap"]);
  if(type==="vocab"){const [de,o]=pick(E_VOCAB[lv]);return C("Vocabulary",`Was heisst „${de}“ auf Englisch?`,makeOptions(o[0],o.slice(1)));}
  if(type==="opp"){const [w,o]=pick(E_OPP[lv]);return C("Opposite",`What is the opposite of “${w}”?`,makeOptions(o[0],o.slice(1)));}
  if(type==="match"){const [de,o]=pick(E_VOCAB[lv]);return C("Übersetzung",`Was bedeutet „${o[0]}“ auf Deutsch?`,makeOptions(de,deDistract(de)));}
  // gap: simple sentence fill
  const gaps=[["I ___ to school every day.","go",["going","goes","gone"]],["She ___ a book now.","is reading",["read","reads","readed"]],["They ___ happy yesterday.","were",["was","are","is"]],["We have ___ finished.","already",["yet","still","ever"]],["He is taller ___ me.","than",["then","that","as"]]];
  const [s,a,d]=pick(gaps);return C("Gap fill",`Fill the gap:  ${s}`,makeOptions(a,d));
}
function deDistract(w){const pool=["Reise","Gesundheit","Freund","Wasser","Schule","Haus","Buch","Tag","Katze","Apfel","gross","essen","wichtig","laufen"];return shuffle(pool.filter(x=>x!==w)).slice(0,3);}
// LOGIK
function genLogic(lv){
  const type=pick(lv===0?["analogy","odd","syllog","pattern"]:["analogy","odd","syllog","pattern","matrix"]);
  if(type==="analogy"){const [a,b,c,d,dis]=pick(ANALOGY[lv]);return C("Analogie",`${a} verhält sich zu ${b} wie ${c} zu  ?`,makeOptions(d,dis));}
  if(type==="odd"){const [items,ans]=pick(ODD[lv]);return C("Ausreisser",`Welches Wort passt nicht zu den anderen?`,shuffle(items.map(it=>({v:it,ok:it===ans}))));}
  if(type==="syllog"){const [pr,ans,dis]=pick(SYLLOG[lv]);return C("Schlussfolgerung",`${pr}  Was folgt daraus?`,makeOptions(ans,dis));}
  if(type==="pattern"){ // Formenreihe fortsetzen (ABAB oder AABB)
    const shapes=["circle","square","triangle","diamond","star"];
    const a=pick(shapes), b=pick(shapes.filter(s=>s!==a));
    let shown,nextShape;
    if(lv<2 || rnd(0,1)===0){ shown=[a,b,a,b]; nextShape=a; }      // ABAB -> A
    else { shown=[a,a,b,b]; nextShape=a; }                          // AABB|AABB -> A
    const vis=`<div style="display:flex;gap:10px;align-items:center;justify-content:center">${shown.map(s=>shapeGlyph(s,46,P.purple)).join("")}<span style="font-size:30px;color:${P.muted}">?</span></div>`;
    const wrongs=shuffle(shapes.filter(s=>s!==nextShape)).slice(0,3);
    const o=V("Musterreihe","Welche Form kommt als Nächstes?",shuffle([{html:shapeGlyph(nextShape,46,P.purple),ok:true},...wrongs.map(s=>({html:shapeGlyph(s,46,P.purple),ok:false}))]));
    o.visualHtml=vis; return o;
  }
  // matrix: number logic 2x2
  const a=rnd(2,9),b=rnd(2,9),c=rnd(2,9); const d=Math.round(a*b/ (a||1)); // keep simple: ratio
  const k=rnd(2,5); const m=[[a,a*k],[b,b*k]]; const ans=b*k;
  const vis=`<div style="display:inline-grid;grid-template-columns:60px 60px;gap:8px;font-size:22px;font-weight:800">
    <div style="background:${P.card};border:1.5px solid ${P.line};border-radius:8px;padding:14px 0">${a}</div>
    <div style="background:${P.card};border:1.5px solid ${P.line};border-radius:8px;padding:14px 0">${a*k}</div>
    <div style="background:${P.card};border:1.5px solid ${P.line};border-radius:8px;padding:14px 0">${b}</div>
    <div style="background:${P.accentSoft};border:1.5px solid ${P.accent};border-radius:8px;padding:14px 0;color:${P.accent}">?</div></div>`;
  const o=C("Zahlenmatrix","Welche Zahl gehört ins Feld mit dem ?",makeOptions(ans,[ans+k,ans-k,ans+1]));o.visualHtml=vis;return o;
}

function genSpatial(lv){
  const type=pick(lv===0?["dieRot","mirror","count"]:["dieRot","mirror","count","unfold","Lrot"]);
  if(type==="dieRot"){const n=rnd(1,6);const vis=svgDie(n,72);const o=V("Würfelauge",`Du siehst diesen Würfel. Welche Augenzahl ist es?`,shuffle([{html:`<div style='font-size:30px;font-weight:800'>${n}</div>`,ok:true},...shuffle([1,2,3,4,5,6].filter(x=>x!==n)).slice(0,3).map(x=>({html:`<div style='font-size:30px;font-weight:800'>${x}</div>`,ok:false}))]));o.visualHtml=vis;return o;}
  if(type==="Lrot"){const baseRot=rnd(0,3);const vis=svgLshape(baseRot,false,80);const correctRot=(baseRot+1)%4;const o=V("Drehung",`Drehe diese Form um 90° im Uhrzeigersinn. Welches Bild entsteht?`,shuffle([{html:svgLshape(correctRot,false,64),ok:true},...shuffle([0,1,2,3].filter(r=>r!==correctRot)).slice(0,3).map(r=>({html:svgLshape(r,false,64),ok:false}))]));o.visualHtml=vis;return o;}
  if(type==="mirror"){const baseRot=rnd(0,3);const vis=svgLshape(baseRot,false,80);const o=V("Spiegelbild",`Welches Bild ist das Spiegelbild (senkrechte Achse)?`,shuffle([{html:svgLshape(baseRot,true,64),ok:true},...shuffle([0,1,2,3].filter(r=>r!==baseRot)).slice(0,3).map(r=>({html:svgLshape(r,false,64),ok:false}))]));o.visualHtml=vis;return o;}
  if(type==="unfold"){return C("Würfelnetz",`Ein Würfel hat immer wie viele Flächen?`,makeOptions("6",["4","8","5"]));}
  // count cubes (visueller Stapel)
  const layers=lv===2?rnd(3,4):rnd(2,3), per=lv===2?rnd(3,4):rnd(2,3); const ans=layers*per;
  let cube=`<svg class="glyph" width="30" height="30" viewBox="0 0 30 30"><rect x="3" y="3" width="24" height="24" rx="4" fill="${P.goldSoft||'#F0E4CF'}" stroke="${P.gold}" stroke-width="2"/></svg>`;

  stack+=`</div>`;
  if(ans<=9) return CNT("Würfel zählen","Wie viele Würfel sind es insgesamt?",ans,9,stack);

function genOrga(lv){
  const type=pick(lv===0?["start","first","order"]:["start","first","order","fit","count"]);
  if(type==="order"){const [q,seq]=pick(ORGA_ORD);return ORD("Organisation",q,shuffle(seq),seq);}
  if(type==="start"){
    const st=rnd(7,16)*60+pick([0,15,30,45]);const D=pick(lv===0?[20,30,45,60]:[25,35,40,50,55]);const pz=pick(lv===0?[0,0,10]:[5,10,15]);
    const ans=st+D+pz;
    const q= pz>0 ? `Ein Termin beginnt um ${fmtT(st)} Uhr und dauert ${D} Minuten. Danach braucht es ${pz} Minuten Pause. Wann kann der nächste Termin frühestens beginnen?`
                  : `Ein Termin beginnt um ${fmtT(st)} Uhr und dauert ${D} Minuten. Wann ist er fertig?`;
    return C("Organisation",q,makeOptions(fmtT(ans)+" Uhr",[fmtT(ans-10)+" Uhr",fmtT(ans+5)+" Uhr",fmtT(ans+15)+" Uhr"]));
  }
  if(type==="fit"){
    const G=pick([30,40,45,60]);const t1=rnd(8,15)*60+pick([0,30]);
    const opts=shuffle([{v:`Kurzmassage (${G-5} Min.)`,ok:true},{v:`Physiotherapie (${G+15} Min.)`,ok:false},{v:`Beratungsgespräch (${G+25} Min.)`,ok:false},{v:`Gruppentraining (${G+40} Min.)`,ok:false}]);
    return C("Organisation",`Zwischen zwei Terminen ist von ${fmtT(t1)} bis ${fmtT(t1+G)} Uhr frei (${G} Minuten). Welche Behandlung passt vollständig in die Lücke?`,opts);
  }
  if(type==="count"){
    const D=pick([20,30,45,60]);const k=rnd(3,lv===2?7:5);const t1=rnd(8,12)*60;const t2=t1+D*k;
    return CNT("Organisation",`Von ${fmtT(t1)} bis ${fmtT(t2)} Uhr sind Termine geplant. Jeder Termin dauert ${D} Minuten. Wie viele Termine passen hinein?`,k,9);
  }
  // first / last
  const acts=shuffle(ORGA_ACT).slice(0,lv===0?3:4);
  const times=shuffle([13*60,14*60+15,15*60+30,16*60+45,10*60+30,11*60+45]).slice(0,acts.length);
  const pairs=acts.map((a,i)=>({a,t:times[i]}));
  const askFirst=Math.random()<0.5;
  const target=pairs.reduce((b,p)=>askFirst?(p.t<b.t?p:b):(p.t>b.t?p:b));
  const list=pairs.map(p=>`${p.a} um ${fmtT(p.t)} Uhr`).join(", ");
  return C("Organisation",`Heute stehen an: ${list}. Welcher Termin kommt ${askFirst?"zuerst":"zuletzt"}?`,shuffle([{v:target.a,ok:true},...pairs.filter(p=>p!==target).slice(0,3).map(p=>({v:p.a,ok:false}))]));
}

  const kind=pick(["sym","word"]);

  const shown=shuffle(pool).slice(0,n);
  const notShown=shuffle(pool.filter(x=>!shown.includes(x))).slice(0,4);
  const invert = lv===2 && Math.random()<0.5;
  let opts;
  if(invert){ opts=shuffle([{v:notShown[0],ok:true},...shuffle(shown).slice(0,3).map(x=>({v:x,ok:false}))]); }
  else { opts=shuffle([{v:pick(shown),ok:true},...notShown.slice(0,3).map(x=>({v:x,ok:false}))]); }

function genConcentration(lv){
  const symbols=lv===0?["✦","◆","●","▲","■"]:lv===1?["✦","✧","◆","◇","●","○","▲","△"]:["✦","✧","◆","◇","●","○","▲","△","■","□","◐","◑"];
  const target=pick(symbols);const count=lv===0?rnd(14,20):lv===1?rnd(22,30):rnd(30,40);
  let grid,answer,guard=0;
  do{ grid=Array.from({length:count},()=>pick(symbols)); if(!grid.includes(target))grid[0]=target; answer=grid.filter(s=>s===target).length; guard++; } while(answer>9 && guard<40);
  if(answer>9){let extra=answer-9;for(let i=0;i<grid.length&&extra>0;i++){if(grid[i]===target){grid[i]=pick(symbols.filter(s=>s!==target));extra--;}}answer=grid.filter(s=>s===target).length;}
  return {target,grid,answer,showMs:lv===0?5000:lv===1?4000:3000};
}
// ── BEST SCORES ─────────────────────────────────────────────
function bestKey(a){return "mc_best_"+a;}
function getBest(a){try{return +localStorage.getItem(bestKey(a))||0;}catch(e){return 0;}}
function setBest(a,v){try{localStorage.setItem(bestKey(a),v);}catch(e){}}
function todayStr(){const d=new Date();return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}
function dailyDone(){try{return localStorage.getItem("mc_daily")===todayStr();}catch(e){return false;}}
function markDaily(){try{localStorage.setItem("mc_daily",todayStr());}catch(e){}}
// seeded RNG für tägliche Challenge (alle bekommen gleiche Aufgaben pro Tag)
function seedFromDate(){const s=todayStr();let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return h;}

const AREAS=["math","german","english","logic","spatial","science","french","orga","network"];

// ── STATE ───────────────────────────────────────────────────
let S={ screen:"home", mode:"area", area:null, level:1, correctRun:0, wrongRun:0,
  task:null, selected:null, levelMsg:null, order:[],
  round:0, score:0, streak:0, bestStreak:0, correct:0, prevBest:0,
  conc:null, concPhase:"show", concSel:null, concTimer:null,
  timed:false, timeLeft:0, timer:null, perQ:15 };

const app=document.getElementById("app");

function pickAreaForMixed(){return pick(AREAS);}

function startSession(opts){
  // opts: {mode:"area"|"mixed"|"timed"|"daily", area?}
  S.mode=opts.mode; S.area=opts.area||null; S.level=1; S.correctRun=0; S.wrongRun=0; S.levelMsg=null;
  S.round=0; S.score=0; S.streak=0; S.bestStreak=0; S.correct=0;
  S.timed=(opts.mode==="timed"); S.perQ=15;
  const bestArea = opts.mode==="area"?opts.area : ("mode_"+opts.mode);
  S.scoreKey=bestArea; S.prevBest=getBest(bestArea);
  if(opts.mode==="daily"){ S.daily=true; } else { S.daily=false; }
  nextTask(); S.screen="play"; render();
}

function curArea(){
  if(S.mode==="area") return S.area;
  if(S.mode==="daily"){ // rotate deterministically through areas + concentration
    const order=[...AREAS,"concentration","memory"];
    return order[S.round % order.length];
  }
  return pickAreaForMixed();
}


// ── AUFGABENTYP-ROTATOR (verhindert Duplikate) ────────────────
function rotateTaskType(lv){
  const pool = [...AREAS, "concentration"];
  if(S.lastTaskTypes===undefined) S.lastTaskTypes=[];
  
  // Entferne die letzten 3 Typen aus der Auswahl
  const forbidden = new Set(S.lastTaskTypes.slice(-3));
  const allowed = pool.filter(t => !forbidden.has(t));
  
  const chosen = allowed.length > 0 ? pick(allowed) : pick(pool);
  
  // Updaten die History
  S.lastTaskTypes.push(chosen);
  if(S.lastTaskTypes.length > 5) S.lastTaskTypes.shift();
  
  return chosen;
}

function nextTask(){
  S.selected=null; S.order=[]; S.levelMsg=null;
  const area = S.mode==="area" ? S.area : (S.mode==="daily" ? ([...AREAS,"concentration"][S.round%([...AREAS,"concentration"].length)]) : rotateTaskType(S.level));
  S.curAreaKey=area;
  if(area==="concentration"){ S.task={kind:"conc",kicker:"Konzentration"}; S.conc=genConcentration(S.level); S.concPhase="show"; S.concSel=null; }
  else if(area==="memory"){ S.task={kind:"mem",kicker:"Merkfähigkeit"}; S.mem=genMemory(S.level); S.memPhase="show"; S.memSel=null; }
  else { S.task=GEN[area].gen(S.level); }
  if(S.timed) startTimer();
}

function startTimer(){
  stopTimer(); S.timeLeft=S.perQ;
  S.timer=setInterval(()=>{
    S.timeLeft-=0.1;
    if(S.timeLeft<=0){ stopTimer(); // Zeit abgelaufen = wie falsch
      if(S.task.kind==="conc"){ if(S.concSel===null){S.concSel=-1; adapt(false); render();} }
      else if(S.task.kind==="mem"){ if(S.memSel===null){S.memSel=-1; adapt(false); render();} }
      else if(S.selected===null){ S.selected=-1; adapt(false); render(); }
    } else { const f=document.getElementById("timerFill"); if(f) f.style.width=(S.timeLeft/S.perQ*100)+"%"; }
  },100);
}
function stopTimer(){ if(S.timer){clearInterval(S.timer);S.timer=null;} }

function adapt(correct){
  S.levelMsg=null;
  if(correct){ S.correctRun++; S.wrongRun=0;
    if(S.correctRun>=2 && S.level<2){ S.level++; S.correctRun=0; S.levelMsg={dir:"up",txt:`Stufe ${S.level+1}: ${LEVELS[S.level]} 🚀`}; }
  } else { S.wrongRun++; S.correctRun=0;
    if(S.level>0){ S.level--; S.levelMsg={dir:"down",txt:`Stufe ${S.level+1}: ${LEVELS[S.level]} — ruhig weiter`}; }
  }
}
function award(correct,base){ if(correct){ S.score+=base+S.streak*2+S.level*3+(S.timed?Math.round(S.timeLeft):0); S.streak++; S.correct++; S.bestStreak=Math.max(S.bestStreak,S.streak);} else S.streak=0; }

function answerChoice(idx){
  if(S.selected!==null)return; stopTimer(); S.selected=idx;
  const ok = idx>=0 && S.task.opts[idx].ok;
  award(ok,10); adapt(ok); render();
}
function answerCount(n){
  if(S.selected!==null)return; stopTimer(); S.selected=n;
  const ok=n===S.task.answer; award(ok,12); adapt(ok); render();
}
function submitOrder(){
  if(S.selected!==null)return; stopTimer(); S.selected=1;
  const ok=JSON.stringify(S.order)===JSON.stringify(S.task.correct);
  award(ok,14); adapt(ok); render();
}
function concAnswer(num){
  if(S.concSel!==null)return; stopTimer(); S.concSel=num;
  const ok=num===S.conc.answer; award(ok,15); adapt(ok); render();
}
function memAnswer(idx){
  if(S.memSel!==null)return; stopTimer(); S.memSel=idx;
  const ok= idx>=0 && S.mem.opts[idx].ok; award(ok,15); adapt(ok); render();
}
function proceed(){
  const nr=S.round+1;
  if(nr>=ROUNDS){ finish(); } else { S.round=nr; nextTask(); }
  render();
}
function finish(){
  stopTimer();
  if(S.score>getBest(S.scoreKey)) setBest(S.scoreKey,S.score);
  if(S.mode==="daily") markDaily();
  S.screen="result"; render();
  // Firebase: Daten schreiben
  if(fbUser && S.mode==="area"){
    fbDb.collection("users").doc(fbUser.uid).collection("sessions").add({
      timestamp: new Date(),
      area: S.area,
      level: S.level,
      score: S.score,
      correct: S.correct,
      total: ROUNDS,
      streak: S.bestStreak,
      mode: S.mode
    }).catch(e => console.log("Firebase write error:", e));
  }
}
// ── RENDER ──────────────────────────────────────────────────
function pill(t,bg,fg){return `<span class="pill" style="background:${bg};color:${fg}">${t}</span>`;}
function levelDots(){return `<div class="levelRow"><div class="lvlDots">${[0,1,2].map(i=>`<span class="dot ${i<=S.level?'on':''}"></span>`).join("")}</div><span class="lvlLabel">Stufe ${S.level+1} · ${LEVELS[S.level]}</span></div>`;}
function areaColor(k){return k==="concentration"?P.good:k==="memory"?P.berry:(GEN[k]?GEN[k].color:P.ink);}
function areaLabel(k){return k==="concentration"?"Konzentration":k==="memory"?"Merkfähigkeit":(GEN[k]?GEN[k].label:k);}

function render(){
  if(S.concTimer){clearTimeout(S.concTimer);S.concTimer=null;}
  if(S.memTimer){clearTimeout(S.memTimer);S.memTimer=null;}

  if(S.screen==="home"){ renderHome(); return; }
  if(S.screen==="result"){ renderResult(); return; }
  // play
  const area=S.curAreaKey; const t=S.task;
  if(t.kind==="conc"){ renderConc(); return; }
  if(t.kind==="mem"){ renderMem(); return; }

  const reveal=S.selected!==null;
  let body="";
  if(t.kind==="choice"){
    body=`<div class="opts">${t.opts.map((o,i)=>{let cls="opt";if(reveal&&o.ok)cls+=" good";else if(reveal&&i===S.selected&&!o.ok)cls+=" bad";const mk=reveal&&o.ok?"✓":(reveal&&i===S.selected&&!o.ok?"✕":"");return `<button class="${cls}" data-i="${i}" ${reveal?"disabled":""}><span>${esc(o.v)}</span><span>${mk}</span></button>`;}).join("")}</div>`;
  } else if(t.kind==="visual"){
    body=`<div class="optsGrid">${t.opts.map((o,i)=>{let cls="opt visualOpt";if(reveal&&o.ok)cls+=" good";else if(reveal&&i===S.selected&&!o.ok)cls+=" bad";const mk=reveal&&o.ok?" ✓":(reveal&&i===S.selected&&!o.ok?" ✕":"");return `<button class="${cls}" data-i="${i}" ${reveal?"disabled":""}>${o.html}<span>${mk}</span></button>`;}).join("")}</div>`;
  } else if(t.kind==="count"){
    const max=t.maxN||9;
    body=`<div class="numGrid">${[...Array(max+1)].map((_,n)=>{let cls="numBtn";if(reveal&&n===t.answer)cls+=" good";else if(reveal&&n===S.selected&&n!==t.answer)cls+=" bad";return `<button class="${cls}" data-n="${n}" ${reveal?"disabled":""}>${n}</button>`;}).join("")}</div>`;
  } else if(t.kind==="order"){
    if(S.order.length===0) S.order=[...t.items];
    body=`<div class="dragHint">Ziehe die Begriffe in die richtige Reihenfolge (oben = zuerst). Dann „Prüfen".</div>
      <div class="dragList" id="dragList">${S.order.map((it,i)=>{let extra="";if(reveal){const correctPos=t.correct[i]===it;extra=correctPos?`style="border-color:${P.good};background:${P.goodSoft}"`:`style="border-color:${P.bad};background:#F7DEDB"`;}return `<div class="dragItem" draggable="${!reveal}" data-i="${i}" ${extra}><span class="handle">⋮⋮</span><span>${esc(it)}</span></div>`;}).join("")}</div>
      ${!reveal?`<button class="next" id="checkOrder">Prüfen</button>`:""}`;
  }

  app.innerHTML=`
    <div class="container" style="padding-top:24px">
      <div class="topbar">
        <button class="back" id="back">← Menü</button>
        <div class="pills">${pill(areaLabel(area),areaColor(area),"#fff")}${pill(S.score+" Pkt",P.ink,"#fff")}${S.streak>1?pill("🔥 "+S.streak,P.accentSoft,P.accent):""}</div>
      </div>
      ${levelDots()}
      ${S.timed?`<div class="timerBar"><div class="timerFill" id="timerFill" style="width:${(S.timeLeft/S.perQ*100)}%"></div></div>`:""}
      <div class="progressWrap"><div class="bar"><div class="barFill" style="width:${(S.round/ROUNDS)*100}%;background:${areaColor(area)}"></div></div>
        <div class="progLabel"><span>Aufgabe ${S.round+1} von ${ROUNDS}</span>${S.mode!=="area"?`<span>${modeName(S.mode)}</span>`:""}</div></div>
      <div class="qcard">
        <div class="qkicker">${esc(t.kicker||"")}</div>
        <div class="qtext">${esc(t.q)}</div>
        ${t.visualHtml?`<div class="qvisual">${t.visualHtml}</div>`:""}
      </div>
      ${body}
      ${reveal&&S.levelMsg?`<div class="feedback ${S.levelMsg.dir}">${S.levelMsg.txt}</div>`:""}
      ${reveal?`<button class="next" id="next">${S.round+1>=ROUNDS?"Ergebnis ansehen":"Weiter →"}</button>`:""}
    </div>`;

  app.querySelector("#back").onclick=()=>{stopTimer();S.screen="home";render();};
  if(t.kind==="choice"||t.kind==="visual") app.querySelectorAll(".opt").forEach(b=>b.onclick=()=>answerChoice(+b.dataset.i));
  if(t.kind==="count") app.querySelectorAll(".numBtn").forEach(b=>b.onclick=()=>answerCount(+b.dataset.n));
  if(t.kind==="order"){ if(!reveal){ setupDrag(); const co=app.querySelector("#checkOrder"); if(co)co.onclick=submitOrder; } }
  const nx=app.querySelector("#next"); if(nx)nx.onclick=proceed;
}

function modeName(m){return m==="mixed"?"Gemischt":m==="timed"?"Zeitdruck":m==="daily"?"Tages-Challenge":"";}

function setupDrag(){
  const list=document.getElementById("dragList"); if(!list)return;
  let dragEl=null;
  list.querySelectorAll(".dragItem").forEach(it=>{
    it.addEventListener("dragstart",e=>{dragEl=it;it.classList.add("dragging");});
    it.addEventListener("dragend",e=>{it.classList.remove("dragging");commitOrder();});
    it.addEventListener("dragover",e=>{e.preventDefault();const after=getAfter(list,e.clientY);if(after==null)list.appendChild(dragEl);else list.insertBefore(dragEl,after);});
  });
  function getAfter(c,y){const els=[...c.querySelectorAll(".dragItem:not(.dragging)")];return els.reduce((closest,child)=>{const box=child.getBoundingClientRect();const off=y-box.top-box.height/2;if(off<0&&off>closest.offset)return{offset:off,element:child};else return closest;},{offset:-Infinity,element:null}).element;}
  function commitOrder(){S.order=[...list.querySelectorAll(".dragItem")].map(el=>el.querySelector("span:last-child").textContent);}
  // touch fallback: tap two items to swap
  let tapIdx=null;
  list.querySelectorAll(".dragItem").forEach((it,i)=>{
    it.addEventListener("click",()=>{
      if(tapIdx===null){tapIdx=i;it.style.outline=`2px solid ${P.accent}`;}
      else{ const arr=[...S.order];[arr[tapIdx],arr[i]]=[arr[i],arr[tapIdx]];S.order=arr;render();}
    });
  });
}

  const c=S.conc; const reveal=S.concSel!==null;
  app.innerHTML=`
    <div class="container" style="padding-top:24px">
      <div class="topbar">
        <button class="back" id="back">← Menü</button>
        <div class="pills">${pill("Konzentration",P.good,"#fff")}${pill(S.score+" Pkt",P.ink,"#fff")}${S.streak>1?pill("🔥 "+S.streak,P.accentSoft,P.accent):""}</div>
      </div>
      ${levelDots()}
      ${S.timed&&S.concPhase==="answer"?`<div class="timerBar"><div class="timerFill" id="timerFill" style="width:${(S.timeLeft/S.perQ*100)}%"></div></div>`:""}
      <div class="progressWrap"><div class="bar"><div class="barFill" style="width:${(S.round/ROUNDS)*100}%;background:${P.good}"></div></div>
        <div class="progLabel"><span>Aufgabe ${S.round+1} von ${ROUNDS}</span>${S.mode!=="area"?`<span>${modeName(S.mode)}</span>`:""}</div></div>
      <div class="qcard" style="padding:24px 22px">
        <div class="center" style="margin-bottom:16px">Zähle, wie oft dieses Zeichen vorkommt:&nbsp;<span style="font-size:30px;color:${P.good}">${c.target}</span></div>
        ${S.concPhase==="show"
          ?`<div class="concGrid">${c.grid.map(s=>`<span>${s}</span>`).join("")}</div><div class="center muted" style="font-size:13px">Merken … (gleich kannst du antworten)</div>`
          :`<div class="center muted" style="font-size:15px;padding:10px 0 18px">Wie oft kam <span style="font-size:22px;color:${P.good}">${c.target}</span> vor?</div>
            <div class="numGrid">${[...Array(10)].map((_,n)=>{let cls="numBtn";if(reveal&&n===c.answer)cls+=" good";else if(reveal&&n===S.concSel&&n!==c.answer)cls+=" bad";return `<button class="${cls}" data-n="${n}" ${reveal?"disabled":""}>${n}</button>`;}).join("")}</div>
            ${reveal&&S.levelMsg?`<div class="feedback ${S.levelMsg.dir}" style="margin-top:14px">${S.levelMsg.txt}</div>`:""}
            ${reveal?`<button class="next" id="next" style="margin-top:18px">${S.round+1>=ROUNDS?"Ergebnis ansehen":"Weiter →"}</button>`:""}`}
      </div>
    </div>`;
  app.querySelector("#back").onclick=()=>{stopTimer();S.screen="home";render();};
  if(S.concPhase==="show"){ S.concTimer=setTimeout(()=>{S.concPhase="answer";if(S.timed)startTimer();render();},c.showMs); }
  else { app.querySelectorAll(".numBtn").forEach(b=>b.onclick=()=>concAnswer(+b.dataset.n)); const nx=app.querySelector("#next"); if(nx)nx.onclick=proceed; }
}

  const m=S.mem; const reveal=S.memSel!==null;
  const qAsk = m.invert
    ? (m.kind==="sym"?"Welches Zeichen war NICHT dabei?":"Welches Wort war NICHT dabei?")

    : `<div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:12px 0">${m.shown.map(s=>`<span class="pill" style="background:${P.berry};color:#fff;font-size:15px;padding:8px 14px">${esc(s)}</span>`).join("")}</div>`;
  const optBtns = m.opts.map((o,i)=>{let cls="opt";if(reveal&&o.ok)cls+=" good";else if(reveal&&i===S.memSel&&!o.ok)cls+=" bad";const mk=reveal&&o.ok?"✓":(reveal&&i===S.memSel&&!o.ok?"✕":"");const fs=m.kind==="sym"?"font-size:26px":"";return `<button class="${cls}" data-i="${i}" ${reveal?"disabled":""}><span style="${fs}">${esc(o.v)}</span><span>${mk}</span></button>`;}).join("");

      </div>

      <div class="progressWrap"><div class="bar"><div class="barFill" style="width:${(S.round/ROUNDS)*100}%;background:${P.berry}"></div></div>
        <div class="progLabel"><span>Aufgabe ${S.round+1} von ${ROUNDS}</span>${S.mode!=="area"?`<span>${modeName(S.mode)}</span>`:""}</div></div>

        ${reveal?`<button class="next" id="next">${S.round+1>=ROUNDS?"Ergebnis ansehen":"Weiter →"}</button>`:""}`:""}
    </div>`;
  app.querySelector("#back").onclick=()=>{stopTimer();S.screen="home";render();};
  if(S.memPhase==="show"){ S.memTimer=setTimeout(()=>{S.memPhase="answer";if(S.timed)startTimer();render();},m.showMs); }
  else { app.querySelectorAll(".opt").forEach(b=>b.onclick=()=>memAnswer(+b.dataset.i)); const nx=app.querySelector("#next"); if(nx)nx.onclick=proceed; }

  const daily=dailyDone();
  const standalone = (window.navigator.standalone===true) || (window.matchMedia&&window.matchMedia('(display-mode:standalone)').matches);
  let tipDismissed=false; try{tipDismissed=localStorage.getItem('mc_tip')==='1';}catch(e){}
  const showTip = !standalone && !tipDismissed;
  app.innerHTML=`
    <header class="hero" style="position:relative"><div class="container">
<div style="position:absolute;top:12px;right:12px;display:flex;gap:8px">
  <div id="authStatus" style="font-size:12px;color:#666;padding:4px 8px;border-radius:4px;background:#f0f0f0"></div>

        <div>
          <div class="eyebrow">Multicheck · Vor der Lehre</div>
          <h1 style="margin:6px 0 0">Klaras Multicheck</h1>
        </div>
      </div>
      <p class="sub" style="margin-top:14px">Hallo Klara! Elf Bereiche wie im echten Multicheck Gesundheit &amp; Soziales — neu mit Naturwissenschaften, Französisch, Merkfähigkeit, Organisation und Vernetztem Denken. Die Aufgaben passen sich deinem Können an.</p>
    </div></header>
    <div class="container">
      ${showTip?`<div class="installTip"><span>📲 Als App speichern: unten auf <b>Teilen</b> tippen → <b>„Zum Home-Bildschirm"</b>. Dann öffnet sich Klaras Multicheck als App im Vollbild.</span><button id="closeTip" aria-label="schliessen">×</button></div>`:""}
      <div class="sectionLabel">Spielmodi</div>
      <div class="grid3" style="margin-bottom:24px">
        <button class="modeCard" data-mode="mixed"><span class="icon2">🎲</span><span class="modeTitle">Gemischt</span><span class="modeDesc">Alle Bereiche bunt gemischt</span></button>
        <button class="modeCard" data-mode="timed" style="background:${P.accent}"><span class="icon2">⏱️</span><span class="modeTitle">Zeitdruck</span><span class="modeDesc">15 Sek. pro Aufgabe</span></button>
        <button class="modeCard" data-mode="daily" style="background:${daily?P.muted:P.good}"><span class="icon2">${daily?'✅':'📅'}</span><span class="modeTitle">Tages-Challenge</span><span class="modeDesc">${daily?'Heute erledigt':'Jeden Tag neu'}</span></button>
      </div>
      <div class="sectionLabel">Bereiche einzeln üben</div>
      <div class="grid2">
        ${areas.map(a=>{const b=getBest(a.key);return `
          <button class="areaCard" data-area="${a.key}">
            <span class="icon" style="background:${a.color}">${a.icon}</span>
            <span class="areaTitle">${a.label}</span>
            <span class="areaGo">Runde starten →</span>
            ${b?`<span class="bestTag">Rekord: ${b} Pkt</span>`:``}
          </button>`;}).join("")}
      </div>
      <p class="footHint">Jede Runde wird neu erzeugt — beliebig oft üben.<br>Drei Stufen: leicht · mittel · schwer. Aufgaben werden schwerer, wenn du viel richtig hast.</p>
    </div>`;
  
  // Login-Handler
  document.getElementById("authBtn").onclick = async () => {
    if(fbUser) {
      fbAuth.signOut();
    } else {
      const provider = new firebase.auth.GoogleAuthProvider();
      fbAuth.signInWithPopup(provider).catch(e => alert("Login fehler: " + e.message));
    }
  };
  document.getElementById("dashBtn").onclick = () => {
    if(fbUser) window.open("dashboard.html?uid="+fbUser.uid, "_blank");
  };
  const authStatus = document.getElementById("authStatus");
  if(fbUser) {
    authStatus.textContent = "Hallo " + (fbUser.displayName||"").split(" ")[0];
    document.getElementById("authBtn").textContent = "Logout";
    document.getElementById("dashBtn").style.display = "block";
  } else {
    authStatus.textContent = "Nicht angemeldet";
    document.getElementById("authBtn").textContent = "Login";
    document.getElementById("dashBtn").style.display = "none";
  }

  app.querySelectorAll("[data-area]").forEach(b=>b.onclick=()=>startSession({mode:"area",area:b.dataset.area}));
  app.querySelectorAll("[data-mode]").forEach(b=>b.onclick=()=>startSession({mode:b.dataset.mode}));
  const ct=app.querySelector("#closeTip"); if(ct)ct.onclick=()=>{try{localStorage.setItem('mc_tip','1');}catch(e){}render();};
}

function renderResult(){
  const pct=Math.round((S.correct/ROUNDS)*100);
  const msg=pct>=80?"Stark! Das sitzt.":pct>=50?"Gut dran — weiter so.":"Dranbleiben lohnt sich.";
  const label=S.mode==="area"?areaLabel(S.area):modeName(S.mode);
  const isRecord=S.score>S.prevBest && S.score>0;
  app.innerHTML=`
    <div class="container resultScreen">
      <div class="eyebrow">${label} · Runde beendet</div>
      <div class="bigScore">${S.score}</div>
      <div class="muted" style="margin-bottom:22px">Punkte${isRecord?" · neuer Rekord 🏆":(S.prevBest?` · Rekord: ${S.prevBest}`:"")}</div>
      <div class="statRow">
        <div class="stat"><div class="statNum">${S.correct}/${ROUNDS}</div><div class="statLbl">richtig</div></div>
        <div class="stat"><div class="statNum">${S.bestStreak} 🔥</div><div class="statLbl">längste Serie</div></div>
        <div class="stat"><div class="statNum">${LEVELS[S.level]}</div><div class="statLbl">Endstufe</div></div>
      </div>
      <div class="resultCard"><div class="bar"><div class="barFill" style="width:${pct}%;background:${pct>=50?P.good:P.accent}"></div></div><div style="margin-top:12px;font-size:18px;font-weight:700">${msg}</div></div>
      <div class="btnRow">
        ${S.mode==="daily"?"":`<button class="btnDark" id="again">Nochmal</button>`}
        <button class="btnLight" id="menu">Zum Menü</button>
      </div>
    </div>`;
  const ag=app.querySelector("#again"); if(ag)ag.onclick=()=>startSession({mode:S.mode,area:S.area});
  app.querySelector("#menu").onclick=()=>{S.screen="home";render();};
}

render();
</script>
</body>
</html>
