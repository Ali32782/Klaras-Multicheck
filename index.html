<script>
// ===== Multicheck Trainer v9: 300 echte Fragen/Bereich + Anti-Repeat + Fehler üben =====

const TARGET_PER_AREA = 300;

function seedRand(n) {
  let x = (n * 1103515245 + 12345) & 0x7fffffff;
  return () => {
    x = (x * 1103515245 + 12345) & 0x7fffffff;
    return x / 0x7fffffff;
  };
}

function pickWrongNums(answer, count, rnd) {
  const wrong = new Set();
  let step = 1;
  while (wrong.size < count) {
    const delta = Math.max(1, Math.round(Math.abs(answer) * 0.1) || 1) * step;
    const cand = answer + (rnd() > 0.5 ? delta : -delta);
    if (cand !== answer) wrong.add(cand);
    step++;
    if (step > 50) wrong.add(answer + wrong.size + 1);
  }
  return [...wrong];
}

function makeNumQ(text, answer, difficulty, exp, id) {
  const rnd = seedRand(id.split('').reduce((a, c) => a + c.charCodeAt(0), 0));
  const wrong = pickWrongNums(Number(answer), 2, rnd).map(String);
  return { id, q: text, opts: [String(answer), wrong[0], wrong[1]], correct: 0, difficulty, exp };
}

function makeTextQ(text, correctOpt, wrongOpts, difficulty, exp, id) {
  const opts = [correctOpt, ...wrongOpts.slice(0, 2)];
  while (opts.length < 3) opts.push('—');
  return { id, q: text, opts, correct: 0, difficulty, exp };
}

function fillTo300(base, area, maker) {
  const out = [...base];
  let i = 0;
  while (out.length < TARGET_PER_AREA) {
    out.push(maker(i, out.length));
    i++;
  }
  return out.slice(0, TARGET_PER_AREA).map((q, idx) => ({
    ...q,
    id: q.id || (area + '-' + idx)
  }));
}

function splitDiff(list) {
  // Assign difficulty by thirds if missing
  return list.map((q, i) => {
    if (q.difficulty) return q;
    const d = i < 100 ? 'easy' : (i < 200 ? 'medium' : 'hard');
    return { ...q, difficulty: d };
  });
}

  const qs = [];
  syn.forEach((s, i) => qs.push(makeTextQ('Synonym von "' + s[0] + '"?', s[1], [s[2], s[3]], 'easy', 'Synonym.', 'de-syn-' + i)));

  plur.forEach((p, i) => qs.push(makeTextQ('Plural von "' + p[0] + '"?', p[1], [p[2], p[3]], 'medium', 'Plural.', 'de-pl-' + i)));

  const words = ['Haus','Garten','Schule','Freund','Arbeit','Gesundheit','Pflege','Patient','Team','Zeit','Morgen','Abend','Wasser','Licht','Kraft','Ruhe','Hilfe','Sicherheit','Vertrauen','Verantwortung','Kommunikation','Organisation','Planung','Dokumentation','Hygiene','Ernährung','Bewegung','Schlaf','Stress','Motivation','Lernen','Prüfung','Übung','Fehler','Erfolg','Ziel','Weg','Schritt','Anfang','Ende','Frage','Antwort','Lösung','Idee','Gedanke','Gefühl','Körper','Geist','Atem','Herz'];
  return fillTo300(qs, 'deutsch', (i, n) => {
    const w = words[i % words.length];
    const mode = i % 3;

    if (mode === 0) return makeTextQ('Welches Wort passt thematisch zu Pflege/Gesundheit eher?', words[(i + 5) % words.length].match(/Pflege|Patient|Hygiene|Ernährung|Gesundheit|Schlaf|Stress|Herz|Atem|Körper/) ? words[(i + 5) % words.length] : 'Patient', ['Vulkan','Algorithmus'], diff, 'Kontext Pflege.', 'de-g-' + n);
    if (mode === 1) return makeTextQ('Rechtschreibung: korrekt ist…', 'dass', ['das (immer)', 'daßz'], diff, '"dass" als Konjunktion.', 'de-g-' + n);
    return makeTextQ('Satzbau: "Der Hund __ schnell."', 'läuft', ['laufen','gelaufen'], diff, '3. Person Singular.', 'de-g-' + n);
  });
}

    qs.push(makeNumQ(a + ' + ' + b + ' = ?', a + b, 'easy', a + '+' + b + '=' + (a + b), 'math-e-add-' + i));
  }
  for (let i = 0; i < 34; i++) {
    const a = 10 + (i % 30);
    const b = 1 + (i % 9);
    qs.push(makeNumQ(a + ' − ' + b + ' = ?', a - b, 'easy', 'Subtraktion', 'math-e-sub-' + i));
  }
  for (let i = 0; i < 33; i++) {
    const a = 2 + (i % 10);
    const b = 2 + (i % 8);
    qs.push(makeNumQ(a + ' × ' + b + ' = ?', a * b, 'easy', 'Multiplikation', 'math-e-mul-' + i));
  }
  // medium 100
  for (let i = 0; i < 40; i++) {
    const a = 2 + (i % 12);
    const b = 5 + (i % 10) * 5;
    const pct = a * 5;
    qs.push(makeNumQ(pct + '% von ' + b + ' = ?', (pct / 100) * b, 'medium', pct + '% × ' + b, 'math-m-pct-' + i));
  }
  for (let i = 0; i < 30; i++) {
    const x = 2 + (i % 15);
    const c = 3 + (i % 10);
    const r = 3 * x + c;
    qs.push(makeNumQ('Löse: 3x + ' + c + ' = ' + r + '. x = ?', x, 'medium', '3x=' + (r - c), 'math-m-eq-' + i));
  }
  for (let i = 0; i < 30; i++) {
    const n = 2 + (i % 12);
    qs.push(makeNumQ(n + '² = ?', n * n, 'medium', n + '×' + n, 'math-m-sq-' + i));
  }
  // hard 100
  for (let i = 0; i < 40; i++) {
    const a = 10 + i;
    const b = 2 + (i % 8);
    qs.push(makeNumQ(a + ' ÷ ' + b + ' = ? (ganzzahlig wo möglich; sonst gerundet)', Math.round((a / b) * 100) / 100 === a / b ? a / b : Math.floor(a / b) * b === a ? a / b : Math.round(a / b), 'hard', 'Division', 'math-h-div-' + i));
  }
  // Fix hard division to only use exact divisions
  // rebuild hard cleanly
  const hard = [];
  for (let i = 0; i < 40; i++) {
    const b = 2 + (i % 9);
    const qv = 3 + (i % 12);
    const a = b * qv;
    hard.push(makeNumQ(a + ' ÷ ' + b + ' = ?', qv, 'hard', a + '/' + b + '=' + qv, 'math-h-div-' + i));
  }
  for (let i = 0; i < 30; i++) {
    const n = i + 2;
    hard.push(makeNumQ('Mittelwert von ' + n + ', ' + (n + 10) + ', ' + (n + 20) + '?', n + 10, 'hard', 'Durchschnitt', 'math-h-avg-' + i));
  }
  for (let i = 0; i < 30; i++) {
    const a = 3 + (i % 10);
    const b = 4 + (i % 8);
    hard.push(makeNumQ(a + '² + ' + b + '² = ?', a * a + b * b, 'hard', 'Summenquadraten', 'math-h-py-' + i));
  }
  // rebuild full list cleanly
  const out = [];
  for (let i = 0; i < 100; i++) {
    const a = 2 + (i % 20), b = 2 + ((i * 3) % 15);
    if (i < 40) out.push(makeNumQ(a + ' + ' + b + ' = ?', a + b, 'easy', 'Addition', 'math-' + out.length));
    else if (i < 70) out.push(makeNumQ((a + 10) + ' − ' + b + ' = ?', a + 10 - b, 'easy', 'Subtraktion', 'math-' + out.length));
    else out.push(makeNumQ(a + ' × ' + b + ' = ?', a * b, 'easy', 'Multiplikation', 'math-' + out.length));
  }
  for (let i = 0; i < 100; i++) {
    if (i < 40) {
      const pct = 5 + (i % 19) * 5;
      const base = 20 + (i % 16) * 5;
      out.push(makeNumQ(pct + '% von ' + base + ' = ?', pct * base / 100, 'medium', 'Prozent', 'math-' + out.length));
    } else if (i < 70) {
      const x = 2 + (i % 15), c = 1 + (i % 9), r = 2 * x + c;
      out.push(makeNumQ('2x + ' + c + ' = ' + r + '. x = ?', x, 'medium', 'Gleichung', 'math-' + out.length));
    } else {
      const n = 2 + (i % 14);
      out.push(makeNumQ(n + '² = ?', n * n, 'medium', 'Quadrat', 'math-' + out.length));
    }
  }
  for (let i = 0; i < 100; i++) {
    if (i < 40) {
      const b = 2 + (i % 9), qv = 4 + (i % 11), a = b * qv;
      out.push(makeNumQ(a + ' ÷ ' + b + ' = ?', qv, 'hard', 'Division', 'math-' + out.length));
    } else if (i < 70) {
      const n = i;
      out.push(makeNumQ('Mittelwert ' + n + ',' + (n + 6) + ',' + (n + 12) + '?', n + 6, 'hard', 'Durchschnitt', 'math-' + out.length));
    } else {
      const a = 3 + (i % 10), b = 4 + (i % 7);
      out.push(makeNumQ(a + '² + ' + b + '² = ?', a * a + b * b, 'hard', 'a²+b²', 'math-' + out.length));
    }
  }
  return out.slice(0, TARGET_PER_AREA);
}

// ---------- NUMBER SEQUENCE ----------
function generateNumberSequenceFragen() {
  const out = [];
  for (let i = 0; i < 100; i++) {
    const step = 2 + (i % 9);
    const a = 1 + (i % 20);
    const seq = [a, a + step, a + 2 * step, a + 3 * step];
    const next = a + 4 * step;
    out.push(makeNumQ(seq.join(', ') + ', ?', next, 'easy', '+' + step, 'ns-e-' + i));
  }
  for (let i = 0; i < 100; i++) {
    const m = 2 + (i % 4);
    let a = 1 + (i % 5);
    const seq = [];
    for (let k = 0; k < 4; k++) { seq.push(a); a *= m; }
    out.push(makeNumQ(seq.join(', ') + ', ?', a, 'medium', '×' + m, 'ns-m-' + i));
  }
  for (let i = 0; i < 100; i++) {
    // differences increase: start, +1,+2,+3,+4
    const start = 1 + (i % 15);
    const seq = [start];
    let cur = start;
    for (let k = 1; k <= 4; k++) { cur += k; seq.push(cur); }
    const next = cur + 5;
    // show first 4, ask 5th already in seq - ask next after 4 terms displayed
    const shown = seq.slice(0, 4);
    const ans = seq[4];
    out.push(makeNumQ(shown.join(', ') + ', ?', ans, 'hard', 'Differenzen +1,+2,+3,+4', 'ns-h-' + i));
  }
  return out;
}

// ---------- ORGANISATION ----------
function generateOrganisationFragen() {
  const out = [];
  for (let i = 0; i < 100; i++) {
    const startH = 8 + (i % 10);
    const startM = (i % 4) * 15;
    const dur = 30 + (i % 6) * 15;
    const endTotal = startH * 60 + startM + dur;
    const eh = Math.floor(endTotal / 60) % 24;
    const em = endTotal % 60;
    const ans = String(eh).padStart(2, '0') + ':' + String(em).padStart(2, '0');
    const start = String(startH).padStart(2, '0') + ':' + String(startM).padStart(2, '0');
    const w1 = String(eh).padStart(2, '0') + ':' + String((em + 15) % 60).padStart(2, '0');
    const w2 = String((eh + 1) % 24).padStart(2, '0') + ':' + String(em).padStart(2, '0');
    out.push(makeTextQ('Start ' + start + ', Dauer ' + dur + ' Min. Ende?', ans, [w1, w2], 'easy', start + ' + ' + dur + ' Min', 'org-e-' + i));
  }
  for (let i = 0; i < 100; i++) {
    const budget = 100 + (i % 20) * 50;
    const pct = 10 + (i % 8) * 5;
    const spent = budget * pct / 100;
    const rest = budget - spent;
    out.push(makeNumQ('Budget ' + budget + ', ausgegeben ' + pct + '%. Rest?', rest, 'medium', 'Rest = ' + rest, 'org-m-' + i));
  }
  for (let i = 0; i < 100; i++) {
    const cap = 5 + (i % 6);
    const t1 = 1 + (i % 3), t2 = 2 + (i % 3), t3 = 2 + ((i + 1) % 3);

  }
  return out;
}

// ---------- CONCENTRATION ----------
function generateConcentrationFragen() {
  const symbols = ['●','◇','○','■','▲'];
  const out = [];
  for (let i = 0; i < 100; i++) {
    const rnd = seedRand(1000 + i);
    const counts = [0, 0, 0];
    let s = '';
    const use = symbols.slice(0, 3);
    for (let k = 0; k < 8; k++) {
      const idx = Math.floor(rnd() * 3);
      // bias first symbol to win uniquely
      const pick = k < 4 ? 0 : idx;
      counts[pick]++;
      s += use[pick];
    }
    // ensure unique max
    let maxI = 0;
    for (let j = 1; j < 3; j++) if (counts[j] > counts[maxI]) maxI = j;
    for (let j = 0; j < 3; j++) if (j !== maxI && counts[j] === counts[maxI]) counts[maxI]++;
    // rebuild string with corrected counts roughly - simpler: fixed pattern
  }
  // simpler deterministic
  for (let i = 0; i < 100; i++) {
    const a = 3 + (i % 3);
    const b = 1 + (i % 2);
    const c = 1;
    const s = '●'.repeat(a) + '◇'.repeat(b) + '○'.repeat(c);
    out.push(makeTextQ('Welches Symbol kommt am häufigsten vor? ' + s, '●', ['◇','○'], 'easy', '● ×' + a, 'co-e-' + i));
  }
  for (let i = 0; i < 100; i++) {
    const word = ['BANANA','MISSISSIPPI','PFLEGE','KONZENTRATION','GESUNDHEIT','MULTICHECK','TRAINING','SCHWEIZ'][i % 8];
    const ch = word[(i * 3) % word.length];
    let cnt = 0;
    for (const c of word) if (c === ch) cnt++;
    out.push(makeNumQ('Wie oft kommt "' + ch + '" in ' + word + ' vor?', cnt, 'medium', 'zählen', 'co-m-' + i));
  }
  for (let i = 0; i < 100; i++) {
    const wrong = 1 + (i % 9);
    const total = 20 + (i % 10) * 5;
    const pct = Math.round((wrong / total) * 100);
    out.push(makeNumQ(wrong + ' von ' + total + ' falsch. Prozent (gerundet)?', pct, 'hard', wrong + '/' + total, 'co-h-' + i));
  }
  return out;
}

  for (let i = 0; i < TARGET_PER_AREA; i++) {
    const p = pairs[i % pairs.length];
    const diff = i < 100 ? 'easy' : (i < 200 ? 'medium' : 'hard');
    out.push(makeTextQ(p[0] + (i >= pairs.length ? ' #' + (i + 1) : ''), p[1], p[2], diff, p[1], 'net-' + i));
  }
  return out;
}

// ---------- FIGURAL ----------
function generateFiguralFragen() {
  const shapes = [
    ['Dreieck', 3],['Quadrat', 4],['Pentagon', 5],['Hexagon', 6],['Heptagon', 7],['Oktagon', 8]
  ];
  const out = [];
  for (let i = 0; i < 100; i++) {
    const s = shapes[i % shapes.length];
    out.push(makeNumQ('Wie viele Seiten hat ein ' + s[0] + '?', s[1], 'easy', s[0] + '=' + s[1], 'fig-e-' + i));
  }
  for (let i = 0; i < 100; i++) {
    const s = shapes[i % shapes.length];
    out.push(makeTextQ('Analogie: Dreieck:3 = ' + s[0] + ':?', String(s[1]), [String(s[1] + 1), String(s[1] - 1)], 'medium', 'Seitenzahl', 'fig-m-' + i));
  }
  for (let i = 0; i < 100; i++) {
    const n = 3 + (i % 6);
    const ang = ((n - 2) * 180) / n;
    out.push(makeNumQ('Innenwinkel regelmäßiges ' + n + '-Eck?', ang, 'hard', 'Formel', 'fig-h-' + i));
  }
  return out;
}

function generateAllFragen() {
  return {
    deutsch: generateDeutschFragenFixed(),
    english: generateEnglischFragen(),
    math: generateMathFragen(),
    logic: generateLogicFragen(),
    science: generateScienceFragen(),
    french: generateFrenchFragen(),
    organisation: generateOrganisationFragen(),
    concentration: generateConcentrationFragen(),
    memory: generateMemoryFragen(),
    spatial: generateSpatialFragen(),
    networked: generateNetworkedFragen(),
    numbersequence: generateNumberSequenceFragen(),
    figural: generateFiguralFragen()
  };
}

const questionBank = generateAllFragen();

const areas = [
  {id: 'deutsch', name: 'Deutsch', icon: 'Aa'},
  {id: 'english', name: 'Englisch', icon: 'EN'},
  {id: 'math', name: 'Mathematik', icon: '∑'},
  {id: 'logic', name: 'Logik', icon: '◇'},
  {id: 'science', name: 'Science', icon: '🔬'},
  {id: 'french', name: 'Französisch', icon: 'FR'},
  {id: 'organisation', name: 'Organisation', icon: '🗓'},
  {id: 'concentration', name: 'Konzentration', icon: '⊙'},
  {id: 'memory', name: 'Merkfähigkeit', icon: '🧠'},
  {id: 'spatial', name: 'Raumvorstellung', icon: '▦'},
  {id: 'networked', name: 'Vernetztes Denken', icon: '🔗'},
  {id: 'numbersequence', name: 'Zahlenreihen', icon: '📊'},
  {id: 'figural', name: 'Figuren', icon: '⬛'}
];

const difficulties = [
  {id: 'veryeasy', name: 'Sehr Leicht', icon: '😊', time: 120},
  {id: 'easy', name: 'Leicht', icon: '🙂', time: 105},
  {id: 'medium', name: 'Mittel', icon: '😐', time: 90},
  {id: 'hard', name: 'Schwer', icon: '😰', time: 75}
];

const ROUNDS_TRAINING = 20;
const ROUNDS_EXAM = 100;
const RECENT_LIMIT = 400;

function loadJSON(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback)); }
  catch (e) { return fallback; }
}

const state = {
  screen: 'home',
  tab: 'train',
  mode: 'train', // train | exam | review
  area: null,
  difficulty: 'medium',
  round: 0,
  correct: 0,
  plannedRounds: ROUNDS_TRAINING,
  currentQuestion: null,
  currentArea: null,
  timeLeft: 90,
  timer: null,
  answerTimeout: null,
  startTime: null,
  sessions: loadJSON('mc_sessions', []),
  darkMode: localStorage.getItem('mc_dark') === 'true',
  answered: false,
  selectedIdx: null,
  usedIds: new Set(),
  recentIds: loadJSON('mc_recent_ids', []),
  mistakes: loadJSON('mc_mistakes', []),
  version: 'v9-300-norepeat-review'
};

if (state.darkMode) document.body.classList.add('dark');

function rand(max) { return Math.floor(Math.random() * max); }

function questionKey(q) {
  return q.id || (q.q + '|' + (q.opts || []).join('|'));
}

function shuffleQuestion(q, area) {
  if (!q) return null;
  const order = q.opts.map((_, i) => i);
  for (let i = order.length - 1; i > 0; i--) {
    const j = rand(i + 1);
    [order[i], order[j]] = [order[j], order[i]];
  }
  return {
    id: q.id || questionKey(q),
    area: area || q.area || state.area,
    q: q.q,
    opts: order.map(i => q.opts[i]),
    correct: order.indexOf(q.correct),
    exp: q.exp || 'Siehe Lösung',
    rawCorrect: q.opts[q.correct]
  };
}

function diffFilter(diff) {
  return (q) => {
    if (diff === 'veryeasy') return q.difficulty === 'easy';
    if (diff === 'easy') return q.difficulty === 'easy' || q.difficulty === 'medium';
    if (diff === 'medium') return true;
    if (diff === 'hard') return q.difficulty === 'hard' || q.difficulty === 'medium';
    return true;
  };
}

function markUsed(id) {
  if (!id) return;
  state.usedIds.add(id);
  state.recentIds = [id, ...state.recentIds.filter(x => x !== id)].slice(0, RECENT_LIMIT);
  localStorage.setItem('mc_recent_ids', JSON.stringify(state.recentIds));
}

function getQuestion(area) {
  const allQs = questionBank[area] || [];
  if (!allQs.length) return null;

  const filter = diffFilter(state.difficulty);
  const recentSet = new Set(state.recentIds);

  const tiers = [
    allQs.filter(q => filter(q) && !state.usedIds.has(q.id) && !recentSet.has(q.id)),
    allQs.filter(q => filter(q) && !state.usedIds.has(q.id)),
    allQs.filter(q => !state.usedIds.has(q.id)),
    // neighbor difficulties already covered by expanding pool
  ];

  let pool = tiers.find(t => t.length > 0) || [];
  if (!pool.length) return null; // exhausted — no repeats in this run

  const q = pool[rand(pool.length)];
  const shuffled = shuffleQuestion(q, area);
  markUsed(shuffled.id);
  return shuffled;
}

function getReviewQuestion() {
  const left = state.mistakes.filter(m => !state.usedIds.has(m.id));
  if (!left.length) return null;
  const m = left[rand(left.length)];
  markUsed(m.id);
  return shuffleQuestion({
    id: m.id,
    q: m.q,
    opts: m.opts,
    correct: m.correct,
    exp: m.exp,
    difficulty: 'medium'
  }, m.area);
}

function saveMistakes() {
  localStorage.setItem('mc_mistakes', JSON.stringify(state.mistakes));
}

function recordMistake(q) {
  if (!q) return;
  const id = q.id || questionKey(q);
  const existing = state.mistakes.find(m => m.id === id);
  if (existing) {
    existing.count = (existing.count || 1) + 1;
    existing.lastWrong = new Date().toISOString();
  } else {
    // store with original option order where correct is index of rawCorrect
    const opts = [...q.opts];
    const correct = q.correct;
    state.mistakes.push({
      id,
      q: q.q,
      opts,
      correct,
      exp: q.exp,
      area: q.area || state.currentArea || state.area || 'unknown',
      count: 1,
      lastWrong: new Date().toISOString()
    });
  }
  saveMistakes();
}

function clearMistake(id) {
  state.mistakes = state.mistakes.filter(m => m.id !== id);
  saveMistakes();
}

function clearTimers() {
  if (state.timer) clearInterval(state.timer);
  if (state.answerTimeout) clearTimeout(state.answerTimeout);
  state.timer = null;
  state.answerTimeout = null;
}

function startTimer() {
  if (state.mode === 'review') {
    state.timeLeft = 90;
  } else {
    const times = {veryeasy: 120, easy: 105, medium: 90, hard: 75};
    state.timeLeft = times[state.difficulty] || 90;
  }
  state.answered = false;
  state.selectedIdx = null;
  if (state.timer) clearInterval(state.timer);

  state.timer = setInterval(() => {
    if (state.answered) return;
    state.timeLeft--;
    if (state.timeLeft <= 0) {
      clearInterval(state.timer);
      state.timer = null;
      answerQuestion(-1);
      return;
    }
    render();
  }, 1000);
}

function saveSession(area, duration, correct, total, difficulty) {
  const safeTotal = total > 0 ? total : 1;
  const validCorrect = Math.min(Math.max(correct, 0), total);
  const session = {
    date: new Date().toISOString(),
    area: area || 'exam',
    difficulty: difficulty,
    durationSecs: Math.round(duration),
    correct: validCorrect,
    total: total,
    percentage: Math.round((validCorrect / safeTotal) * 100)
  };
  state.sessions.push(session);
  localStorage.setItem('mc_sessions', JSON.stringify(state.sessions));
}

function toggleDarkMode() {
  state.darkMode = !state.darkMode;
  document.body.classList.toggle('dark');
  localStorage.setItem('mc_dark', state.darkMode);
  render();
}

function countQuestions() {
  return Object.keys(questionBank).reduce((sum, k) => sum + (questionBank[k] ? questionBank[k].length : 0), 0);
}

function nextQuestion() {
  if (state.mode === 'review') {
    state.currentQuestion = getReviewQuestion();
    state.currentArea = state.currentQuestion ? state.currentQuestion.area : null;
    return state.currentQuestion;
  }
  const areaId = state.area || areas[rand(areas.length)].id;
  state.currentArea = areaId;
  state.currentQuestion = getQuestion(areaId);
  return state.currentQuestion;
}

function finishEarlyIfNeeded() {
  // called when no question available
  clearTimers();
  const total = Math.max(state.round, 1);
  saveSession(state.mode === 'review' ? 'review' : (state.area || 'exam'), (Date.now() - state.startTime) / 1000, state.correct, total, state.difficulty);
  state.plannedRounds = total;
  state.screen = 'result';
  state.endedEarly = true;
}

function renderHome(app) {
  const mistakeCount = state.mistakes.length;
  let html = '<header>';
  html += '<button class="dark-toggle" onclick="toggleDarkMode()">' + (state.darkMode ? '☀️' : '🌙') + '</button>';
  html += '<h1>Multicheck Trainer PRO</h1><p>300 Fragen/Bereich · Keine Wiederholung · Fehler üben</p></header>';
  html += '<div class="container">';
  html += '<div class="nav-tabs">';
  html += '<button class="nav-tab' + (state.tab === 'train' ? ' active' : '') + '" onclick="state.tab=\'train\'; render()">🎯 Trainieren</button>';
  html += '<button class="nav-tab' + (state.tab === 'review' ? ' active' : '') + '" onclick="state.tab=\'review\'; render()">🔁 Fehler üben' + (mistakeCount ? ' (' + mistakeCount + ')' : '') + '</button>';
  html += '<button class="nav-tab' + (state.tab === 'stats' ? ' active' : '') + '" onclick="state.tab=\'stats\'; render()">📊 Statistiken</button>';
  html += '</div>';

  if (state.tab === 'train') {
    html += '<h2>Bereiche</h2><div class="grid">';
    for (let a of areas) {
      const n = (questionBank[a.id] || []).length;
      html += '<div class="card" onclick="chooseDifficulty(\'' + a.id + '\')">';
      html += '<div class="card-icon">' + a.icon + '</div><div class="card-name">' + a.name + '</div>';
      html += '<div style="font-size:10px;color:#888;margin-top:4px;">' + n + ' Fragen</div></div>';
    }
    html += '</div>';
    html += '<button class="btn" onclick="chooseDifficulty(null)" style="margin-top:20px;">🎓 PRÜFUNGS-SIMULATION (100 Q)</button>';
  } else if (state.tab === 'review') {
    html += '<h2>🔁 Frühere Fehler</h2>';
    html += '<div class="stats-grid"><div class="stat-card"><div class="stat-num">' + mistakeCount + '</div><div class="stat-label">offen</div></div></div>';
    if (!mistakeCount) {
      html += '<p style="margin:16px 0;color:#666;">Noch keine Fehler gespeichert. Falsch beantwortete Fragen erscheinen hier.</p>';
    } else {
      html += '<p style="margin:12px 0;font-size:13px;color:#666;">Richtig beantwortete Fehler werden aus der Liste entfernt.</p>';
      html += '<button class="btn" onclick="startReview()">Fehler jetzt üben</button>';
      html += '<button class="btn btn-secondary" onclick="if(confirm(\'Alle Fehler löschen?\')){state.mistakes=[];saveMistakes();render();}">Liste leeren</button>';
      html += '<h3>Offene Fehler</h3>';
      state.mistakes.slice(0, 15).forEach(m => {
        const area = areas.find(a => a.id === m.area);
        html += '<div class="stat-card" style="text-align:left;margin-bottom:8px;"><div style="font-weight:600;font-size:13px;">' + m.q + '</div>';
        html += '<div style="font-size:11px;color:#888;margin-top:4px;">' + (area ? area.name : m.area) + ' · ' + (m.count || 1) + '× falsch</div></div>';
      });
    }
  } else {
    html += '<h2>📊 Statistiken</h2>';
    const avg = state.sessions.length > 0 ? Math.round(state.sessions.reduce((a, b) => a + b.percentage, 0) / state.sessions.length) : 0;
    html += '<div class="stats-grid">';
    html += '<div class="stat-card"><div class="stat-num">' + state.sessions.length + '</div><div class="stat-label">Trainings</div></div>';
    html += '<div class="stat-card"><div class="stat-num">' + avg + '%</div><div class="stat-label">Ø Quote</div></div>';
    html += '<div class="stat-card"><div class="stat-num">' + mistakeCount + '</div><div class="stat-label">Offene Fehler</div></div>';
    html += '</div>';
    for (let s of state.sessions.slice(-10).reverse()) {
      const area = areas.find(a => a.id === s.area) || {name: s.area};
      const diff = difficulties.find(d => d.id === s.difficulty);
      html += '<div class="stat-card">' + area.name + ': ' + s.correct + '/' + s.total + ' (' + s.percentage + '%)' + (diff ? ' · ' + diff.name : '') + '</div>';
    }
  }
  html += '</div><div class="version">' + state.version + ' | ' + countQuestions() + ' Fragen total</div>';
  app.innerHTML = html;
}

function chooseDifficulty(area) {
  state.screen = 'difficulty';
  state.area = area;
  state.mode = area ? 'train' : 'exam';
  render();
}

function startReview() {
  if (!state.mistakes.length) return;
  clearTimers();
  state.mode = 'review';
  state.screen = 'play';
  state.area = null;
  state.difficulty = 'medium';
  state.round = 0;
  state.correct = 0;
  state.answered = false;
  state.selectedIdx = null;
  state.endedEarly = false;
  state.usedIds = new Set();
  state.plannedRounds = Math.min(20, state.mistakes.length);
  state.startTime = Date.now();
  if (!nextQuestion()) {
    alert('Keine Fehler zum Üben.');
    state.screen = 'home';
    state.tab = 'review';
    render();
    return;
  }
  startTimer();
  render();
}

function renderDifficulty(app) {
  let html = '<header><h1>Schwierigkeitsstufe</h1></header><div class="container"><div class="difficulty-grid">';
  for (let d of difficulties) {
    html += '<div class="diff-btn" onclick="selectDifficulty(\'' + d.id + '\')">' + d.icon + '<br>' + d.name + '</div>';
  }
  html += '</div><button class="btn btn-secondary" onclick="state.screen=\'home\'; render();">← Zurück</button></div>';
  app.innerHTML = html;
}

function selectDifficulty(diff) {
  clearTimers();
  state.screen = 'play';
  state.difficulty = diff;
  state.round = 0;
  state.correct = 0;
  state.answered = false;
  state.selectedIdx = null;
  state.endedEarly = false;
  state.usedIds = new Set();
  state.plannedRounds = state.area ? ROUNDS_TRAINING : ROUNDS_EXAM;
  state.mode = state.area ? 'train' : 'exam';
  state.startTime = Date.now();

  if (!nextQuestion()) {
    alert('Keine Fragen verfügbar.');
    state.screen = 'home';
    render();
    return;
  }
  startTimer();
  render();
}

function renderPlay(app) {
  const q = state.currentQuestion;
  if (!q) {
    state.screen = 'home';
    renderHome(app);
    return;
  }
  const limit = state.plannedRounds;
  const pct = (state.round / limit) * 100;
  const timerClass = state.timeLeft > 30 ? 'ok' : (state.timeLeft > 10 ? 'warning' : '');
  const label = state.mode === 'review' ? 'Fehler-Übung' : 'Frage';

  let html = '<div class="play-screen">';
  html += '<div class="timer-bar ' + timerClass + '">⏱️ ' + state.timeLeft + 's</div>';
  html += '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
  html += '<div style="font-size:12px; color:#666; margin-bottom:16px;">' + label + ' ' + (state.round + 1) + '/' + limit + '</div>';
  html += '<div class="question-box"><div class="question">' + q.q + '</div>';
  html += '<div class="options">';

  for (let i = 0; i < q.opts.length; i++) {
    let style = '';
    if (state.answered) {
      if (i === q.correct) style = ' style="border-color:var(--success);background:#e8f5e9;"';
      else if (i === state.selectedIdx) style = ' style="border-color:var(--danger);background:#fdecea;"';
    }
    html += '<button class="option" onclick="answerQuestion(' + i + ')" ' + (state.answered ? 'disabled' : '') + style + '>' + q.opts[i] + '</button>';
  }

  html += '</div>';
  if (state.answered) {
    const prefix = state.selectedIdx === q.correct ? 'Richtig. ' : (state.selectedIdx < 0 ? 'Zeit abgelaufen. ' : 'Leider falsch. ');
    html += '<div class="explanation">💡 ' + prefix + (q.exp || '') + '</div>';
  }
  html += '</div></div>';
  app.innerHTML = html;
}

function renderResult(app) {
  const limit = state.plannedRounds;
  const pct = limit ? Math.round((state.correct / limit) * 100) : 0;
  const duration = (Date.now() - state.startTime) / 1000;
  let gradeText = pct >= 90 ? '🌟 Hervorragend!' : (pct >= 75 ? '✅ Gut!' : (pct >= 60 ? '🟡 Befriedigend' : '❌ Üben'));
  let color = pct >= 75 ? '#28a745' : (pct >= 60 ? '#ffc107' : '#dc3545');

  let html = '<div class="result-screen">';
  html += '<h1>✅ Fertig!</h1>';
  if (state.endedEarly) html += '<p style="color:#666;font-size:13px;">Vorzeitig beendet — keine neuen Fragen mehr ohne Wiederholung.</p>';
  html += '<div class="big-score" style="color:' + color + '">' + pct + '%</div>';
  html += '<div>' + state.correct + ' von ' + limit + ' richtig</div>';
  html += '<div style="font-size:16px; margin:20px 0;">' + gradeText + '</div>';
  html += '<div style="font-size:14px; color:#666;">Dauer: ' + Math.floor(duration / 60) + ':' + String(Math.floor(duration % 60)).padStart(2, '0') + '</div>';
  if (state.mistakes.length) html += '<button class="btn" onclick="state.screen=\'home\'; state.tab=\'review\'; render();">🔁 Fehler üben (' + state.mistakes.length + ')</button>';
  html += '<button class="btn btn-secondary" onclick="state.screen=\'home\'; state.tab=\'train\'; render();">← Menü</button>';
  html += '</div>';
  app.innerHTML = html;
}

function render() {
  const app = document.getElementById('app');
  if (state.screen === 'home') renderHome(app);
  else if (state.screen === 'difficulty') renderDifficulty(app);
  else if (state.screen === 'play') renderPlay(app);
  else if (state.screen === 'result') renderResult(app);
}

function answerQuestion(idx) {
  if (state.answered || state.screen !== 'play' || !state.currentQuestion) return;
  if (state.round >= state.plannedRounds) return;

  state.answered = true;
  state.selectedIdx = idx;
  if (state.timer) { clearInterval(state.timer); state.timer = null; }

  const q = state.currentQuestion;
  const isCorrect = idx === q.correct;
  if (isCorrect) {
    state.correct += 1;
    if (state.mode === 'review') clearMistake(q.id);
  } else {
    recordMistake(q);
  }

  render();

  if (state.answerTimeout) clearTimeout(state.answerTimeout);
  state.answerTimeout = setTimeout(() => {
    state.round += 1;

    if (state.round >= state.plannedRounds) {
      clearTimers();
      saveSession(state.mode === 'review' ? 'review' : (state.area || 'exam'), (Date.now() - state.startTime) / 1000, state.correct, state.plannedRounds, state.difficulty);
      state.screen = 'result';
    } else {
      const next = nextQuestion();
      state.answered = false;
      state.selectedIdx = null;
      if (!next) {
        finishEarlyIfNeeded();
      } else {
        startTimer();
      }
    }
    render();
  }, 2000);
}

render();
</script>

</html>
